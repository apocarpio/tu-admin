#!/bin/bash
# Configuration settings TU Admin
# Auteur: Simone MUREDDU pour iesS
# Version: 3.0 - Architecture modulaire

# Configuration des fichiers
SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
LOG_FILE="$SCRIPT_DIR/logs/tu_admin.log"
CONFIG_FILE="$SCRIPT_DIR/config/settings.conf"
DB_CREDENTIALS_FILE="$SCRIPT_DIR/data/.db_credentials"
TU_APP_PATH_FILE="$SCRIPT_DIR/data/.tu_app_path"

# Répertoires
APP_DIR="$SCRIPT_DIR"
BACKUP_DIR="$SCRIPT_DIR/backups"
DATA_DIR="$SCRIPT_DIR/data"
SCRIPTS_DIR="$SCRIPT_DIR/scripts"
TOOLS_DIR="$SCRIPT_DIR/tools"
MYSQLTUNER_DIR="$SCRIPT_DIR/MySQLTuner"

# Variables globales pour DB
DB_HOST=""
DB_DATABASE=""
DB_USER=""
DB_PASSWORD=""
DB_PORT=""

# Variable globale pour le chemin de l'application TU
TU_APP_PATH=""

# Export variables
export SCRIPT_DIR LOG_FILE CONFIG_FILE DB_CREDENTIALS_FILE TU_APP_PATH_FILE
export APP_DIR BACKUP_DIR DATA_DIR SCRIPTS_DIR TOOLS_DIR MYSQLTUNER_DIR
export DB_HOST DB_DATABASE DB_USER DB_PASSWORD DB_PORT TU_APP_PATH
